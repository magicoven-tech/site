    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/cms.js"></script>
    <script type="text/babel" src="js/components/LlmSimulator.js"></script>

    <script type="text/babel">
        // Inicializa AOS
        AOS.init({
            duration: 800,
            easing: 'ease-out-cubic',
            once: true,
            offset: 100
        });

        // Carrega o post
        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');

            const container = document.getElementById('post-container');

            if (!slug) {
                container.innerHTML = `
                    <div class="section-container" style="padding: 100px 20px; text-align: center;">
                        <h1 style="color: var(--color-accent-primary); font-size: 2rem; margin-bottom: 1rem;">Post não encontrado</h1>
                        <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">O post que você está procurando não existe.</p>
                        <a href="blog.html" class="btn btn-primary">← Voltar ao Blog</a>
                    </div>
                `;
                return;
            }

            try {
                const post = await CMS.getPostBySlug(slug);

                if (!post) {
                    container.innerHTML = `
                        <div class="section-container" style="padding: 100px 20px; text-align: center;">
                            <h1 style="color: var(--color-accent-primary); font-size: 2rem; margin-bottom: 1rem;">Post não encontrado</h1>
                            <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">O post "${slug}" não existe.</p>
                            <a href="blog.html" class="btn btn-primary">← Voltar ao Blog</a>
                        </div>
                    `;
                    return;
                }

                // Atualiza título da página
                document.getElementById('page-title').textContent = `${post.title} - Magic Oven`;

                // Configura renderer do Marked
                const renderer = new marked.Renderer();

                // Custom Image Renderer
                renderer.image = function (href, title, text) {
                    let cleanHref = href.replace(/#(medium|full)$/, '');

                    // Se a imagem for local (/uploads/...) prefixa com a URL da API do Render
                    if (cleanHref.startsWith('/uploads/')) {
                        cleanHref = `${API_CONFIG.baseURL}${cleanHref}`;
                    }

                    let className = 'post-image';
                    let wrapperClass = '';

                    if (href.endsWith('#medium')) {
                        className += ' image-medium';
                        wrapperClass = 'figure-medium';
                    } else if (href.endsWith('#full')) {
                        className += ' image-full';
                        wrapperClass = 'figure-full';
                    } else {
                        wrapperClass = 'figure-standard';
                    }

                    return `
                        <figure class="${wrapperClass}">
                            <img src="${cleanHref}" alt="${text}" title="${title || ''}" class="${className}">
                            ${text ? `<figcaption>${text}</figcaption>` : ''}
                        </figure>
                    `;
                };

                // Remove Wrapping P for Images (hacky but works for marked)
                renderer.paragraph = function (text) {
                    if (text.trim().startsWith('<figure')) {
                        return text;
                    }
                    return `<p>${text}</p>`;
                };

                // Respect line breaks and custom code block renderer
                marked.setOptions({ breaks: true });
                
                renderer.code = function (code, language) {
                    const lang = (language || 'text').toLowerCase();
                    const escapedCode = code.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
                    
                    return `
                        <div class="custom-code-block" style="position: relative; margin: 2rem 0; background: #1d1f21; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;">
                            <div class="code-header" style="display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1rem; background: #2d2f31; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                <span style="color: #a9b7c6; font-size: 0.85rem; font-family: var(--font-mono); text-transform: uppercase;">${lang}</span>
                                <button class="copy-code-btn" title="Copiar código" onclick="copyCodeBlock(this)" style="background: none; border: none; color: #a9b7c6; cursor: pointer; padding: 0.25rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#a9b7c6'">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                </button>
                            </div>
                            <pre style="margin: 0; padding: 1rem; overflow-x: auto; background: transparent; white-space: pre-wrap; word-break: break-all;"><code class="language-${lang}">${escapedCode}</code></pre>
                        </div>
                    `;
                };

                marked.use({ renderer });

                // Renderiza o post
                let contentHTML = marked.parse(post.content);
                
                // Placeholder Injection: Substitui {simulador} por um ponto de montagem do React
                if (contentHTML.includes('{simulador}')) {
                    contentHTML = contentHTML.replace('{simulador}', '<div id="llm-simulator-mount"></div>');
                }

                container.innerHTML = `
                    <div class="blog-post-wrapper" style="max-width: 720px; margin: 0 auto; padding: var(--spacing-4xl) var(--spacing-lg);">
                        
                        <header class="post-header" style="margin-bottom: var(--spacing-3xl); text-align: center;">
                            <div style="display: flex; justify-content: center; gap: var(--spacing-md); margin-bottom: var(--spacing-lg);">
                                <span style="color: var(--color-text-secondary); font-family: var(--font-mono); font-size: var(--font-size-sm); letter-spacing: 0.05em;">
                                    ${CMS.formatDate(post.date)}
                                </span>
                                <span style="color: var(--color-accent-primary); font-weight: var(--font-weight-bold); font-size: var(--font-size-sm); letter-spacing: 0.05em;">
                                    ${post.category}
                                </span>
                            </div>

                            <h1 style="font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: var(--font-weight-bold); line-height: 1.1; margin-bottom: var(--spacing-lg); color: var(--color-text-primary); letter-spacing: -0.02em;">
                                ${post.title}
                            </h1>

                            <p style="font-size: 1.25rem; color: var(--color-text-secondary); line-height: 1.6; font-weight: var(--font-weight-light); text-align: left; width: 100%; margin: var(--spacing-xl) 0 0 0;">
                                ${post.excerpt}
                            </p>

                        </header>

                            <div class="markdown-content post-body">
                                ${contentHTML}
                            </div>

                        <div style="margin-top: var(--spacing-4xl); padding-top: var(--spacing-xl); border-top: 1px solid rgba(255, 255, 255, 0.1);">
                            <p style="color: var(--color-text-secondary); margin-bottom: var(--spacing-lg);">
                                Escrito por <strong style="color: var(--color-accent-primary);">${(!post.author || post.author.toLowerCase() === 'admin' || post.author.toLowerCase() === 'administrador') ? 'Magic Oven' : post.author}</strong>
                            </p>

                            ${post.tags && post.tags.length > 0 ? `
                                <div style="display: flex; gap: var(--spacing-sm); flex-wrap: wrap;">
                                    ${post.tags.map(tag => `
                                        <a href="#" class="blog-tag">
                                            #${tag}
                                        </a>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <footer style="margin-top: var(--spacing-3xl); text-align: left;">
                            <a href="blog.html" class="btn btn-outline">← Voltar ao Blog</a>
                        </footer>
                    </div>
                `;

                if (window.Prism) {
                    Prism.highlightAllUnder(container);
                }

                // Monta o componente React se o placeholder existir
                const simulatorMount = document.getElementById('llm-simulator-mount');
                if (simulatorMount && window.LlmSimulator) {
                    const root = ReactDOM.createRoot(simulatorMount);
                    root.render(<window.LlmSimulator />);
                }

            } catch (error) {
                console.error('Erro ao carregar post:', error);

                // Fallback amigável
                container.innerHTML = `
                    <div class="section-container" style="padding: 100px 20px; text-align: center;">
                        <h1 style="color: var(--color-accent-primary); font-size: 2rem; margin-bottom: 1rem;">Erro ao carregar post</h1>
                        <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">Não foi possível carregar o conteúdo. Tente recarregar a página.</p>
                        <a href="blog.html" class="btn btn-primary">← Voltar ao Blog</a>
                    </div>
                `;
            }
        }

        // Carrega o post quando a página carregar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPost);
        } else {
            loadPost();
        }

        window.copyCodeBlock = function(btn) {
            const pre = btn.closest('.custom-code-block').querySelector('pre');
            const tooltip = btn.getAttribute('title');
            const svg = btn.innerHTML;
            
            navigator.clipboard.writeText(pre.innerText).then(() => {
                btn.setAttribute('title', 'Copiado!');
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#27ff2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                setTimeout(() => {
                    btn.setAttribute('title', tooltip);
                    btn.innerHTML = svg;
                }, 2000);
            });
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/glitch-text.js"></script>
</body>
