<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Magic Oven</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="../assets/favicon/favicon-16x16.png" sizes="16x16" />
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="../assets/favicon/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="vignette-frame"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../assets/logotipo.svg" alt="Magic Oven" class="logo-svg"
                    style="height: 40px; margin-bottom: var(--spacing-sm);">
                <p class="login-subtitle">Acesso Administrativo</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required autocomplete="username" autofocus>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="password">Senha</label>
                        <a href="#" id="forgotPasswordLink" style="color: var(--color-accent-primary); font-size: var(--font-size-sm); text-decoration: none;">Esqueci a senha</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword(this)">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-login">Entrar</button>
                </div>
            </form>

            <form id="changePasswordForm" style="display: none;">
                <p style="color: #ffcc00; font-size: var(--font-size-sm); margin-bottom: var(--spacing-md);">Para sua segurança, defina uma nova senha forte antes de acessar o painel.</p>
                <div class="form-group">
                    <label for="newPassword">Nova Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword(this)">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Nova Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword(this)">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-login">Salvar e Entrar</button>
                </div>
            </form>

            <form id="forgotPasswordForm" style="display: none;">
                <p style="color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-bottom: var(--spacing-md);">Digite seu nome de usuário ou e-mail. Enviaremos um código para redefinir sua senha.</p>
                <div class="form-group">
                    <label for="recoveryEmail">Email ou Usuário</label>
                    <input type="text" id="recoveryEmail" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-login">Receber Código</button>
                    <button type="button" class="btn btn-outline btn-login" style="margin-top: var(--spacing-sm);" onclick="showForm('loginForm')">Voltar</button>
                </div>
            </form>

            <form id="resetPasswordForm" style="display: none;">
                <p style="color: var(--color-text-secondary); font-size: var(--font-size-sm); margin-bottom: var(--spacing-md);">Insira o código recebido no seu e-mail e sua nova senha.</p>
                <div class="form-group">
                    <label for="resetCode">Código de Segurança</label>
                    <input type="text" id="resetCode" required>
                </div>
                <div class="form-group">
                    <label for="resetNewPassword">Nova Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="resetNewPassword" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePassword(this)">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-login">Redefinir Senha</button>
                    <button type="button" class="btn btn-outline btn-login" style="margin-top: var(--spacing-sm);" onclick="showForm('loginForm')">Voltar</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Modal de Alerta Customizado -->
    <div id="alert-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
        <div class="modal-content" style="background: var(--color-surface-elevated); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-lg); padding: var(--spacing-xl); max-width: 400px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
            <h3 id="alert-modal-title" style="margin-top: 0; color: var(--color-accent-primary);">Aviso</h3>
            <p id="alert-modal-msg" style="color: var(--color-text-secondary); margin-bottom: 2rem;">Mensagem</p>
            <div style="display: flex; justify-content: flex-end;">
                <button id="alert-modal-ok" class="btn btn-primary" style="min-width: 100px;">OK</button>
            </div>
        </div>
    </div>
    <script src="../js/config.js"></script>
    <script src="js/login.js"></script>
    <script src="../js/glitch-text.js"></script>
</body>

</html>
