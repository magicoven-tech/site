<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar conteúdo</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/favicon/favicon-32x32.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="../assets/favicon/favicon-16x16.png" sizes="16x16" />
  <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="../assets/favicon/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <div class="vignette-frame"></div>

  <nav class="main-nav">
    <div class="nav-container">
      <a href="../index.html" class="logo">
        <img src="../assets/logotipo.svg" alt="Magic Oven" class="logo-svg">
      </a>

      <div style="display: flex; gap: var(--spacing-md); align-items: center;">
        <button class="btn btn-primary" onclick="showCreateForm()">Nova publicação</button>
        <button class="btn btn-outline" id="logoutBtn">Sair</button>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h1 class="page-title">
        <span class="page-title-small">ADMINISTRAÇÃO</span>
        <span class="page-title-large">Gerenciar conteúdo</span>
      </h1>
    </div>

    <div class="admin-tabs">
      <button class="tab-button active" onclick="switchTab('blog')">Blog</button>
      <button class="tab-button" onclick="switchTab('projects')">Projetos</button>
      <button class="tab-button" onclick="switchTab('messages')">Mensagens <span id="unread-count" class="badge" style="display: none;">0</span></button>
      <button class="tab-button" onclick="switchTab('profile')">Perfil</button>
    </div>

    <!-- Blog Tab -->
    <div id="blog-tab" class="tab-content active">
      <div class="form-container" id="blog-form" style="display: none;">
        <h2>Novo Blog</h2>
        <form id="blogPostForm">
          <div class="form-group">
            <label for="blog-title">Título *</label>
            <input type="text" id="blog-title" required>
          </div>

          <div class="form-group">
            <label for="blog-category">Categoria *</label>
            <input type="text" id="blog-category" placeholder="DESIGN, CÓDIGO, ARTE, etc" required>
          </div>

          <div class="form-group">
            <label for="blog-excerpt">Resumo *</label>
            <textarea id="blog-excerpt" required></textarea>
          </div>

          <div class="form-group editor-wrapper">
            <label for="blog-content">Conteúdo (Markdown)</label>

            <!-- Toolbar Flutuante -->
            <div class="editor-toolbar">
              <button type="button" class="toolbar-toggle" id="toolbar-toggle">+</button>
              <div class="toolbar-options">
                <button type="button" class="toolbar-btn" id="toolbar-image" title="Imagem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="toolbar-video" title="Vídeo (Embed)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="toolbar-code" title="Código">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="toolbar-divider" title="Divisor">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="toolbar-embed" title="Link">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                  </svg>
                </button>
              </div>
            </div>

            <textarea id="blog-content"
              style="min-height: 400px; font-family: 'Space Grotesk', sans-serif; line-height: 1.6;"></textarea>
            <input type="file" id="blog-image-input" accept="image/*" style="display: none;">
          </div>

          <div class="form-group">
            <label for="blog-tags">Tags (separadas por vírgula)</label>
            <input type="text" id="blog-tags" placeholder="design, código, arte">
          </div>

          <div class="form-group form-checkbox">
            <input type="checkbox" id="blog-featured">
            <label for="blog-featured">Artigo em destaque</label>
          </div>

          <div class="form-group form-checkbox">
            <input type="checkbox" id="blog-published" checked>
            <label for="blog-published">Publicar imediatamente</label>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="cancelForm()">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar artigo</button>
          </div>
        </form>
      </div>

      <div id="blog-batch-actions" class="batch-actions-bar hidden">
        <div class="batch-info"><span id="blog-selected-count">0</span> item(s) selecionado(s)</div>
        <div class="batch-actions-buttons">
          <button class="btn btn-outline" onclick="AdminCMS.clearSelection('blog')">Cancelar</button>
          <button class="btn btn-primary" style="background-color: #ff3b30; color: white; border-color: #ff3b30;"
            onclick="AdminCMS.batchDelete('blog')">Excluir selecionados</button>
        </div>
      </div>

      <div class="select-all-container" id="blog-select-all-container" style="display: none;">
        <div class="item-checkbox">
          <input type="checkbox" id="blog-select-all" onchange="AdminCMS.toggleSelectAll('blog', this.checked)">
        </div>
        <label for="blog-select-all">Selecionar todos os artigos</label>
      </div>

      <div id="blog-list" class="items-grid">
        <!-- Posts serão carregados aqui -->
      </div>
    </div>

    <!-- Projects Tab -->
    <div id="projects-tab" class="tab-content">
      <div class="form-container" id="project-form" style="display: none;">
        <h2>Novo projeto</h2>
        <form id="projectForm">
          <div class="form-group">
            <label for="project-title">Título *</label>
            <input type="text" id="project-title" required>
          </div>

          <div class="form-group">
            <label for="project-category">Categoria *</label>
            <input type="text" id="project-category" placeholder="Web Design • Desenvolvimento" required>
          </div>

          <div class="form-group">
            <label for="project-description">Descrição breve *</label>
            <textarea id="project-description" required></textarea>
          </div>

          <div class="form-group editor-wrapper">
            <label for="project-full-description">Descrição completa (Markdown)</label>

            <!-- Toolbar Flutuante -->
            <div class="editor-toolbar">
              <button type="button" class="toolbar-toggle" id="project-toolbar-toggle">+</button>
              <div class="toolbar-options">
                <button type="button" class="toolbar-btn" id="project-toolbar-image" title="Imagem">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="project-toolbar-video" title="Vídeo (Embed)">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon points="23 7 16 12 23 17 23 7"></polygon>
                    <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="project-toolbar-code" title="Código">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="16 18 22 12 16 6"></polyline>
                    <polyline points="8 6 2 12 8 18"></polyline>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="project-toolbar-divider" title="Divisor">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                </button>
                <button type="button" class="toolbar-btn" id="project-toolbar-embed" title="Link">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                  </svg>
                </button>
              </div>
            </div>

            <textarea id="project-full-description"
              style="min-height: 200px; font-family: 'Space Grotesk', sans-serif; line-height: 1.6;"></textarea>
            <input type="file" id="project-full-description-image-input" accept="image/*" style="display: none;">
          </div>

          <div class="form-group">
            <label for="project-client">Cliente</label>
            <input type="text" id="project-client">
          </div>

          <div class="form-group">
            <label for="project-year">Ano</label>
            <input type="text" id="project-year" placeholder="2025">
          </div>

          <div class="form-group">
            <label for="project-gradient">Gradiente CSS (caso não tenha imagem)</label>
            <input type="text" id="project-gradient" placeholder="linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
          </div>

          <div class="form-group">
            <label>Imagem do Projeto</label>
            <div id="project-image-dropzone" class="dropzone">
              <div class="dropzone-text">Arraste uma imagem aqui ou clique para selecionar</div>
              <div class="dropzone-info">Limite sugerido: 5MB (Arquivos maiores serão comprimidos automaticamente)</div>
              <input type="file" id="project-image-input" accept="image/*" style="display: none;">
              <button type="button" class="dropzone-clear" id="clear-image">×</button>
              <div class="dropzone-preview" id="image-preview-container">
                <img id="image-preview" src="" alt="Pré-visualização">
              </div>
            </div>
            <input type="hidden" id="project-image-url">
          </div>

          <div class="form-group">
            <label for="project-url">URL do projeto</label>
            <input type="url" id="project-url" placeholder="https://exemplo.com">
          </div>

          <div class="form-group form-checkbox">
            <input type="checkbox" id="project-featured">
            <label for="project-featured">Projeto em destaque</label>
          </div>

          <div class="form-group form-checkbox">
            <input type="checkbox" id="project-published" checked>
            <label for="project-published">Publicar imediatamente</label>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-outline" onclick="cancelForm()">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar projeto</button>
          </div>
        </form>
      </div>

      <div id="projects-batch-actions" class="batch-actions-bar hidden">
        <div class="batch-info"><span id="projects-selected-count">0</span> item(s) selecionado(s)</div>
        <div class="batch-actions-buttons">
          <button class="btn btn-outline" onclick="AdminCMS.clearSelection('projects')">Cancelar</button>
          <button class="btn btn-primary" style="background-color: #ff3b30; color: white; border-color: #ff3b30;"
            onclick="AdminCMS.batchDelete('projects')">Excluir selecionados</button>
        </div>
      </div>

      <div class="select-all-container" id="projects-select-all-container" style="display: none;">
        <div class="item-checkbox">
          <input type="checkbox" id="projects-select-all" onchange="AdminCMS.toggleSelectAll('projects', this.checked)">
        </div>
        <label for="projects-select-all">Selecionar todos os projetos</label>
      </div>

      <div id="projects-list" class="items-grid">
        <!-- Projetos serão carregados aqui -->
      </div>
    </div>

    <!-- Messages Tab -->
    <div id="messages-tab" class="tab-content">
      <div id="messages-list" class="messages-container">
        <!-- Mensagens serão carregadas aqui -->
      </div>
    </div>

    <!-- Profile Tab -->
    <div id="profile-tab" class="tab-content">
      <div class="form-container">
        <h2>Minha Conta</h2>
        
        <div id="admin-user-selector" style="display: none; margin-bottom: var(--spacing-lg);">
          <label for="user-select" style="display: block; margin-bottom: var(--spacing-xs);">Gerenciar perfil de outro usuário (Super Admin):</label>
          <select id="user-select" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); outline: none;">
            <!-- Options added by JS -->
          </select>
        </div>

        <form id="profileForm">
          <div class="form-group">
            <label for="profile-email">Novo E-mail (opcional)</label>
            <input type="email" id="profile-email" placeholder="Para não alterar, deixe em branco">
          </div>
          <div class="form-group">
            <label for="profile-password">Nova Senha (mín. 6 caracteres)</label>
            <input type="password" id="profile-password" placeholder="Para não alterar, deixe em branco" minlength="6">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="profile-save-btn">Salvar Alterações</button>
          </div>
          <div id="profile-message" style="margin-top: var(--spacing-md); display: none;"></div>
        </form>
      </div>
    </div>
  </div>

  <div class="formatting-menu" id="formatting-menu">
    <button type="button" class="format-btn" data-format="bold" title="Negrito">B</button>
    <button type="button" class="format-btn" data-format="italic" title="Itálico"><i>i</i></button>
    <button type="button" class="format-btn" data-format="link" title="Link">
      <svg viewBox="0 0 24 24">
        <path
          d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z">
        </path>
      </svg>
    </button>
    <div class="separator"></div>
    <button type="button" class="format-btn" data-format="h2" title="Título">T</button>
    <button type="button" class="format-btn" data-format="h3" title="Subtítulo" style="font-size: 12px;">T</button>
    <div class="separator"></div>
    <button type="button" class="format-btn" data-format="quote" title="Citação">
      <svg viewBox="0 0 24 24">
        <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"></path>
      </svg>
    </button>
  </div>

  <div class="image-menu" id="image-menu">
    <button type="button" class="format-btn" data-size="standard" title="Padrão (Inset)">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2">
        </rect>
        <rect x="7" y="7" width="10" height="10" fill="currentColor" fill-opacity="0.5"></rect>
      </svg>
    </button>
    <button type="button" class="format-btn" data-size="medium" title="Médio (Wide)">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="4" width="20" height="16" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2">
        </rect>
        <rect x="4" y="8" width="16" height="8" fill="currentColor" fill-opacity="0.5"></rect>
      </svg>
    </button>
    <button type="button" class="format-btn" data-size="full" title="Tela Cheia (Full)">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="5" width="20" height="14" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2">
        </rect>
        <path d="M2 12h20" stroke="currentColor" stroke-width="2"></path>
      </svg>
    </button>
    </button>
  </div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
    <div class="modal-content" style="background: var(--color-surface); padding: 2rem; border-radius: var(--radius-md); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--color-border); max-width: 400px; width: 90%;">
      <h3 id="confirm-modal-title" style="margin-top: 0; color: var(--color-error);">Confirmação</h3>
      <p id="confirm-modal-msg" style="color: var(--color-text-secondary); margin-bottom: 2rem;">Tem certeza?</p>
      <div style="display: flex; justify-content: flex-end; gap: 1rem;">
        <button id="confirm-modal-cancel" class="btn btn-outline" style="min-width: 100px;">Cancelar</button>
        <button id="confirm-modal-ok" class="btn" style="background: var(--color-error); color: #fff; min-width: 100px;">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script src="../js/config.js?v=1.2"></script>
  <script src="js/cms-admin.js?v=1.2"></script>
  <script src="../js/glitch-text.js?v=1.2"></script>

  <!-- Modal de Alerta Customizado -->
  <div id="alert-modal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; justify-content: center; align-items: center;">
      <div class="modal-content" style="background: var(--color-surface); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: var(--radius-lg); padding: var(--spacing-xl); max-width: 400px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
          <h3 id="alert-modal-title" style="margin-top: 0; color: var(--color-accent-primary);">Aviso</h3>
          <p id="alert-modal-msg" style="color: var(--color-text-secondary); margin-bottom: 2rem;">Mensagem</p>
          <div style="display: flex; justify-content: flex-end;">
              <button id="alert-modal-ok" class="btn btn-primary" style="min-width: 100px;">OK</button>
          </div>
      </div>
  </div>

</body>

</html>
